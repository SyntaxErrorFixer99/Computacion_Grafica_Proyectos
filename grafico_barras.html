<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfico de Barras</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

h1 {
    margin-top: 20px;
}

canvas {
    background: #fff;
    border-radius: 10px;
    margin-top: 20px;
}

a {
    display: inline-block;
    margin-top: 20px;
    color: white;
    border: 1px solid white;
    padding: 8px 15px;
    border-radius: 20px;
    text-decoration: none;
}
</style>
</head>

<body>

<h1>📊 Gráfico de Barras Arcoíris</h1>
<h3>José Demetrio Chávez Vargas</h3>

<canvas id="canvas" width="350" height="300"></canvas>

<br>
<a href="index.html">⬅ Volver</a>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let alturas = [50, 120, 90, 150, 80, 130];
let colores = ["red","orange","yellow","green","blue","violet"];

function dibujar() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0; i<alturas.length; i++){
        ctx.fillStyle = colores[i];
        ctx.fillRect(50 + i*40, 250 - alturas[i], 30, alturas[i]);
    }
}

dibujar();
</script>

</body>
</html>
