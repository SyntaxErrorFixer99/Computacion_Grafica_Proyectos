<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Círculo Animado</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        color: white;
    }

    h2 {
        margin-top: 30px;
        font-size: 32px;
    }

    h1 {
        font-size: 18px;
        color: #cbd5f5;
        margin-bottom: 30px;
    }

    .contenedor {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 60vh;
    }

    canvas {
        background-color: #0b1120;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* Botón volver */
    .btn-volver {
        margin-top: 20px;
        display: inline-block;
        padding: 10px 20px;
        border-radius: 25px;
        border: 1px solid white;
        color: white;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn-volver:hover {
        background-color: #38bdf8;
        border-color: #38bdf8;
    }
</style>

</head>

<body>

<h2>Círculo Animado</h2>
<h1>Desarrollado por José Demetrio Chávez Vargas</h1>

<div class="contenedor">
    <canvas id="canvas" width="400" height="400"></canvas>
</div>

<a href="index.html" class="btn-volver">⬅ Volver al Inicio</a>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let radio = 0;
let maxRadio = 100;
let creciendo = true;

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let x = canvas.width / 2;
    let y = canvas.height / 2;

    ctx.beginPath();
    ctx.arc(x, y, radio, 0, Math.PI * 2);

    // estilo glow
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 3;
    ctx.shadowColor = "#38bdf8";
    ctx.shadowBlur = 20;

    ctx.stroke();
    ctx.shadowBlur = 0;

    // animación (crecer y reducir)
    if (creciendo) {
        radio += 2;
        if (radio >= maxRadio) creciendo = false;
    } else {
        radio -= 2;
        if (radio <= 20) creciendo = true;
    }
}

setInterval(dibujar, 30);
</script>

</body>
</html>
