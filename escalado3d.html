<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escalado 3D</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<rect x='8' y='12' width='48' height='30' rx='4' fill='%2338bdf8'/>
<rect x='14' y='18' width='36' height='18' fill='%230b1120'/>
<rect x='4' y='44' width='56' height='6' rx='2' fill='%2338bdf8'/>
</svg>">

<style>
body{margin:0;overflow:hidden;background:#000;color:white;font-family:Segoe UI;}

.info{
 position:absolute; top:10px; left:50%; transform:translateX(-50%);
 background:white; color:black; padding:10px 20px; border-radius:10px; z-index:10;
}

.boton-volver{position:absolute;top:20px;left:20px;}
.nombre{position:absolute;top:20px;right:20px;color:#94a3b8;}
</style>
</head>

<body>

<div class="info">
<b>INSTRUCCIONES:</b> + para agrandar | - para reducir
</div>

<button class="boton-volver" onclick="history.back()">⬅ Volver</button>
<div class="nombre">José Demetrio Chávez Vargas</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BoxGeometry();
const materials = [
 new THREE.MeshBasicMaterial({color:0xff0000}),
 new THREE.MeshBasicMaterial({color:0xff7f00}),
 new THREE.MeshBasicMaterial({color:0xffff00}),
 new THREE.MeshBasicMaterial({color:0x00ff00}),
 new THREE.MeshBasicMaterial({color:0x0000ff}),
 new THREE.MeshBasicMaterial({color:0x8b00ff})
];

const cube = new THREE.Mesh(geometry, materials);
scene.add(cube);

document.addEventListener("keydown",(e)=>{
 if(e.key==="+"){
  cube.scale.x+=0.1;
  cube.scale.y+=0.1;
  cube.scale.z+=0.1;
 }
 if(e.key==="-"){
  cube.scale.x-=0.1;
  cube.scale.y-=0.1;
  cube.scale.z-=0.1;
 }
});

function animate(){
 requestAnimationFrame(animate);
 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
