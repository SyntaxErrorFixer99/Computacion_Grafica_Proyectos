<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalado 3D - Cubo</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #020617, #000);
    color: white;
}

.boton-volver {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: 1px solid white;
    cursor: pointer;
    background: transparent;
    color: white;
    z-index: 10;
}

.boton-volver:hover {
    background: #2563eb;
}

.nombre {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #94a3b8;
    font-size: 14px;
    z-index: 10;
}
</style>
</head>

<body>

<button class="boton-volver" onclick="history.back()">⬅ Volver</button>
<div class="nombre">José Demetrio Chávez Vargas</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BoxGeometry(2,2,2);

const materials = [
    new THREE.MeshBasicMaterial({ color: 0xff0000 }),
    new THREE.MeshBasicMaterial({ color: 0xff7f00 }),
    new THREE.MeshBasicMaterial({ color: 0xffff00 }),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 }),
    new THREE.MeshBasicMaterial({ color: 0x0000ff }),
    new THREE.MeshBasicMaterial({ color: 0x8b00ff })
];

const cube = new THREE.Mesh(geometry, materials);
scene.add(cube);

// ESCALADO
let scaleDirection = 0.01;

function animate(){
    requestAnimationFrame(animate);

    cube.scale.x += scaleDirection;
    cube.scale.y += scaleDirection;
    cube.scale.z += scaleDirection;

    if(cube.scale.x > 2 || cube.scale.x < 0.5){
        scaleDirection *= -1;
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
