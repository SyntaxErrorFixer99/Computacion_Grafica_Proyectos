<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computación Gráfica</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b1120;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.8);
    position: sticky;
    top: 0;
}

.navbar h2 {
    margin: 0;
    color: #38bdf8;
}

.navbar span {
    color: #aaa;
}

/* SECCIONES */
.seccion {
    padding: 30px 40px;
}

.seccion h3 {
    margin-bottom: 15px;
}

/* SCROLL HORIZONTAL */
.fila {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.fila::-webkit-scrollbar {
    height: 6px;
}

.fila::-webkit-scrollbar-thumb {
    background: #38bdf8;
    border-radius: 10px;
}

/* TARJETAS */
.card {
    min-width: 220px;
    height: 140px;
    border-radius: 15px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.1);
    background: #1d4ed8;
}

/* CÍRCULO */
.circulo {
    width: 40px;
    height: 40px;
    background: #38bdf8;
    border-radius: 50%;
    box-shadow: 0 0 15px #38bdf8;
    margin-bottom: 10px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111827;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

.modal-content a {
    display: block;
    margin: 10px 0;
    padding: 10px;
    background: #1e293b;
    border-radius: 10px;
    text-decoration: none;
    color: white;
}

.modal-content a:hover {
    background: #2563eb;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Computación Gráfica</h2>
    <span>José Demetrio Chávez Vargas</span>
</div>

<!-- SECCIÓN EJERCICIOS -->
<div class="seccion">
    <h3>Ejercicios en Clase</h3>

    <div class="fila">

        <div class="card" onclick="window.location.href='circulo.html'">
            <div class="circulo"></div>
            <p>Círculo</p>
        </div>

        <div class="card" onclick="abrirModalActividad()">
            <p>Actividad N°4</p>
        </div>

    </div>
</div>

<!-- SECCIÓN TRABAJOS -->
<div class="seccion">
    <h3>Trabajos Nuevos</h3>

    <div class="fila">

        <div class="card" onclick="window.location.href='circulo.html'">
            <div class="circulo"></div>
            <p>Círculo</p>
        </div>

        <div class="card" onclick="abrirModalTrabajos()">
            <p>Ver trabajos</p>
        </div>

    </div>
</div>

<!-- MODAL ACTIVIDAD -->
<div id="modalActividad" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModalActividad()">✖</span>
        <h3>Actividad N° 4</h3>

        <a href="grafico_barras_dinamico.html">📊 Barras</a>
        <a href="grafico_puntos_movimiento.html">✨ Puntos</a>
        <a href="curva_funcion_coseno.html">📈 Coseno</a>
    </div>
</div>

<!-- MODAL TRABAJOS -->
<div id="modalTrabajos" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModalTrabajos()">✖</span>
        <h3>Trabajos Nuevos</h3>

        <a href="circulo.html">🟣 Círculo</a>
        <a href="cuadrado_triangulo.html">🟦 Figuras</a>
        <a href="grafico_barras.html">📊 Barras</a>
        <a href="funcion_matematica.html">📈 Función</a>
        <a href="linea_dinamica.html">📉 Línea</a>
    </div>
</div>

<script>
function abrirModalActividad() {
    document.getElementById("modalActividad").style.display = "flex";
}
function cerrarModalActividad() {
    document.getElementById("modalActividad").style.display = "none";
}

function abrirModalTrabajos() {
    document.getElementById("modalTrabajos").style.display = "flex";
}
function cerrarModalTrabajos() {
    document.getElementById("modalTrabajos").style.display = "none";
}

window.onclick = function(e) {
    document.querySelectorAll(".modal").forEach(m => {
        if (e.target === m) m.style.display = "none";
    });
}
</script>

</body>
</html>
