<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computación Gráfica</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<rect x='8' y='12' width='48' height='30' rx='4' fill='%2338bdf8'/>
<rect x='14' y='18' width='36' height='18' fill='%230b1120'/>
<rect x='4' y='44' width='56' height='6' rx='2' fill='%2338bdf8'/>
</svg>">

<style>
/* (TODO TU CSS IGUAL, NO LO TOQUÉ) */
body { margin:0; font-family:'Segoe UI'; text-align:center; background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover; color:white;}
.overlay{background:rgba(0,0,0,0.7);min-height:100vh;padding:50px 20px;}
.contenedor{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.card{width:270px;padding:20px;border-radius:15px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);}
button{border:1px solid white;background:transparent;color:white;padding:8px 15px;border-radius:20px;cursor:pointer;}
.modal{display:none;position:fixed;z-index:999;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:#0f172a;padding:30px;border-radius:15px;width:340px;color:#f1f5f9;}
.close{cursor:pointer;float:right;}
</style>
</head>

<body>

<div class="overlay">

<h2><i class="fas fa-laptop-code"></i> Computación Gráfica</h2>
<h1>José Demetrio Chávez Vargas</h1>

<div class="contenedor">

<!-- ACTIVIDAD 6 -->
<div class="card">
    <h3><i class="fas fa-project-diagram"></i> Tarea Actividad N° 6</h3>

    <p><i class="fas fa-file-alt"></i> Investigación</p>

    <ul>
        <li><i class="fas fa-bezier-curve"></i> Curvas Paramétricas</li>
        <li><i class="fas fa-cubes"></i> Mallas Poligonales</li>
    </ul>

    <button onclick="abrirModal6()">Ver</button>
</div>

</div>
</div>

<!-- MODAL ACTIVIDAD 6 -->
<div id="modal6" class="modal">
<div class="modal-content" style="width:90%; max-width:900px;">

<span class="close" onclick="cerrarModal6()">✖</span>

<h3><i class="fas fa-project-diagram"></i> Actividad N° 6</h3>

<!-- MENÚ -->
<div id="menu6">

<h4><i class="fas fa-file-alt"></i> Opciones</h4>

<button onclick="mostrarPDF()">
<i class="fas fa-file-pdf"></i> Ver Informe
</button>

<button onclick="window.location.href='curvas_parametricas.html'">
<i class="fas fa-bezier-curve"></i> Curvas Paramétricas
</button>

<button onclick="window.location.href='mallas_poligonales.html'">
<i class="fas fa-cubes"></i> Mallas Poligonales
</button>

</div>

<!-- PDF -->
<div id="visorPDF" style="display:none; margin-top:15px;">

<iframe 
src="ACTIVIDAD NRO. 6.pdf"
width="100%" 
height="500px"
style="border-radius:10px;">
</iframe>

<button onclick="volverMenu()">⬅ Volver</button>

</div>

</div>
</div>

<!-- 🔥 SCRIPT LIMPIO Y ÚNICO -->
<script>

// ===== MODAL ACTIVIDAD 6 =====
function abrirModal6() {
    document.getElementById("modal6").style.display = "flex";

    // RESET
    document.getElementById("menu6").style.display = "block";
    document.getElementById("visorPDF").style.display = "none";
}

function cerrarModal6() {
    document.getElementById("modal6").style.display = "none";
}

// ===== CONTROL PDF =====
function mostrarPDF() {
    document.getElementById("menu6").style.display = "none";
    document.getElementById("visorPDF").style.display = "block";
}

function volverMenu() {
    document.getElementById("menu6").style.display = "block";
    document.getElementById("visorPDF").style.display = "none";
}

// ===== CERRAR AL HACER CLICK FUERA =====
window.onclick = function(event) {
    let m4 = document.getElementById("modal6");
    if (event.target == m4) m4.style.display = "none";
}

</script>

</body>
</html>
