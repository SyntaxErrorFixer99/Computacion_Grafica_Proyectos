<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gráfico de Barras</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
  }

  h2 {
    margin-top: 30px;
    font-size: 32px;
  }

  h1 {
    font-size: 18px;
    color: #cbd5f5;
    margin-bottom: 20px;
  }

  .contenedor-principal {
    display: flex;
    justify-content: center;
  }

  .contenedor {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 300px;
    gap: 15px;
    padding: 20px;
    border-radius: 15px;
    background-color: #0b1120;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  .barra {
    width: 40px;
    background: #38bdf8;
    border-radius: 8px;
    transition: height 0.5s ease;
    box-shadow: 0 0 10px #38bdf8;
  }

  /* Botón volver */
  .btn-volver {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-decoration: none;
    color: white;
    border: 1px solid white;
    padding: 10px 20px;
    border-radius: 25px;
    transition: 0.3s;
    background-color: rgba(255,255,255,0.1);
  }

  .btn-volver:hover {
    background-color: #38bdf8;
    border-color: #38bdf8;
  }
</style>

</head>

<body>

<h2>Gráfico de Barras Dinámico</h2>
<h1>Desarrollado por José Demetrio Chávez Vargas</h1>

<div class="contenedor-principal">
  <div class="contenedor" id="grafico"></div>
</div>

<!-- Botón volver -->
<a href="index.html" class="btn-volver">⬅ Volver al inicio</a>

<script>
const contenedor = document.getElementById("grafico");
const barras = [];

// Crear 5 barras
for (let i = 0; i < 5; i++) {
  let div = document.createElement("div");
  div.classList.add("barra");
  contenedor.appendChild(div);
  barras.push(div);
}

function actualizar() {
  barras.forEach(barra => {
    let valor = Math.floor(Math.random() * 91) + 10;
    barra.style.height = valor * 2 + "px";
  });
}

setInterval(actualizar, 1000);
actualizar();
</script>

</body>
</html>
