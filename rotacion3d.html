<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotación 3D - Cubo de Colores</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #020617, #000);
    color: white;
}

/* BOTÓN VOLVER */
.boton-volver {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: 1px solid white;
    cursor: pointer;
    background: transparent;
    color: white;
    transition: 0.3s;
    z-index: 10;
}

.boton-volver:hover {
    background: #2563eb;
}

/* NOMBRE */
.nombre {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #94a3b8;
    font-size: 14px;
    z-index: 10;
}

/* TÍTULO */
.titulo {
    position: absolute;
    top: 60px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    color: #38bdf8;
    z-index: 10;
}
</style>
</head>

<body>

<button class="boton-volver" onclick="history.back()">⬅ Volver</button>
<div class="nombre">José Demetrio Chávez Vargas</div>
<div class="titulo">Rotación 3D del Cubo</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

// CÁMARA
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 5;

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ (MEJORA VISUAL)
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(2, 2, 5);
scene.add(light);

// GEOMETRÍA
const geometry = new THREE.BoxGeometry(2, 2, 2);

// MATERIALES (COLORES)
const materials = [
    new THREE.MeshStandardMaterial({ color: 0xff0000 }),
    new THREE.MeshStandardMaterial({ color: 0xff7f00 }),
    new THREE.MeshStandardMaterial({ color: 0xffff00 }),
    new THREE.MeshStandardMaterial({ color: 0x00ff00 }),
    new THREE.MeshStandardMaterial({ color: 0x0000ff }),
    new THREE.MeshStandardMaterial({ color: 0x8b00ff })
];

// CUBO
const cube = new THREE.Mesh(geometry, materials);
scene.add(cube);

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);

    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;

    renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
