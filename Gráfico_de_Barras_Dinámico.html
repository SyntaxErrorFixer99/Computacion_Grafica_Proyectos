<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gráfico de Barras</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
  }

  .contenedor {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 300px;
    gap: 10px;
    margin-top: 50px;
  }

  .barra {
    width: 40px;
    background: #2563eb;
    transition: height 0.5s;
  }
</style>
</head>
<body>

<h2>Gráfico de Barras Dinámico</h2>
<div class="contenedor" id="grafico"></div>

<script>
  const contenedor = document.getElementById("grafico");
  const barras = [];

  // Crear 5 barras
  for (let i = 0; i < 5; i++) {
    let div = document.createElement("div");
    div.classList.add("barra");
    contenedor.appendChild(div);
    barras.push(div);
  }

  function actualizar() {
    barras.forEach(barra => {
      let valor = Math.floor(Math.random() * 91) + 10; // 10 a 100
      barra.style.height = valor * 2 + "px";
    });
  }

  setInterval(actualizar, 1000);
  actualizar();
</script>

</body>
</html>
